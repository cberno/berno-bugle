name: The Berno Bugle

on:
  schedule:
    - cron: "15 6 * * *"   # 4:15am EDT — the real run
    - cron: "0 7 * * *"    # 5:00am — insurance if GitHub drifted
    - cron: "45 7 * * *"   # 5:45am — last resort
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check the docket
        id: check
        run: |
          echo "edition=$(TZ=America/New_York date +'%A, %B %-d, %Y')" >> "$GITHUB_OUTPUT"
          echo "stamp=$(TZ=America/New_York date +%F)" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "schedule" ] && \
             [ -f "archive/bugle_$(TZ=America/New_York date +%F).png" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install the pressroom
        if: steps.check.outputs.skip != 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q poppler-utils imagemagick \
            libpango-1.0-0 libpangocairo-1.0-0 libpangoft2-1.0-0 libharfbuzz-subset0
          pip install -q -r requirements.txt

      - name: Print today's edition
        if: steps.check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUGLE_ICS_URL: ${{ secrets.BUGLE_ICS_URL }}
          BUGLE_BIRTHDAYS_ICS_URL: ${{ secrets.BUGLE_BIRTHDAYS_ICS_URL }}
          EBIRD_API_KEY: ${{ secrets.EBIRD_API_KEY }}
        run: |
          mkdir -p archive
          python bugle_action.py

      - name: Deliver to the inbox
        if: steps.check.outputs.skip != 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: The Berno Bugle
          to: ${{ secrets.GMAIL_ADDRESS }}
          subject: "The Berno Bugle — ${{ steps.check.outputs.edition }}"
          html_body: >
            <img src="https://cberno.github.io/berno-bugle/archive/bugle_${{ steps.check.outputs.stamp }}.png"
                 width="936" style="max-width:100%" alt="The Berno Bugle">
          attachments: latest.png

      - name: Deliver to the wall
        if: steps.check.outputs.skip != 'true'
        continue-on-error: true
        run: |
          git config user.name "The Berno Bugle"
          git config user.email "bugle@users.noreply.github.com"
          git add latest.png archive/
          git commit -m "Edition $(date +%Y-%m-%d)" || echo "Nothing new to print"
          git pull --rebase --autostash origin main
          git push
